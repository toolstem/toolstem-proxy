name = "toolstem-proxy"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Custom domain routing for mcp.toolstem.com.
# Top-level keys must come before any [section] in TOML.
routes = [
  { pattern = "mcp.toolstem.com", custom_domain = true }
]

# Public, non-secret variables. Secrets (APIFY_TOKEN, PAYTO_ADDRESS) are set
# via `wrangler secret put` in the deploy workflow — never committed.
[vars]
APIFY_GATEWAY = "https://mcp.apify.com"
DEFAULT_ACTOR = "toolstem/toolstem-mcp-server"
SEC_ACTOR = "toolstem/toolstem-sec-mcp-server"

# Network: Base mainnet (eip155:8453) for production, Sepolia (eip155:84532) for testing.
# Mainnet uses CDP facilitator (requires CDP_API_KEY_ID + CDP_API_KEY_SECRET secrets).
# Sepolia can use either CDP or the public x402.org facilitator.
X402_NETWORK = "eip155:8453"
# X402_FACILITATOR is unused when CDP_API_KEY_ID is present — code routes to CDP automatically.
# Kept here as a fallback for non-CDP / testnet-only deployments.
X402_FACILITATOR = "https://www.x402.org/facilitator"

# Static assets (test.html etc.) served from /public.
[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "none"
# Worker MUST run first for /mcp/* routes to receive their custom headers
# (X-Payment, mcp-session-id). With run_worker_first=false, Cloudflare's
# asset handler intercepts and strips them.
run_worker_first = ["/mcp/*", "/health"]

# Observability — keeps logs in Cloudflare so we can debug agent calls.
[observability]
enabled = true
