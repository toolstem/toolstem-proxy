name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Type-check
        run: npm run typecheck

      - name: Push Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          PAYTO_ADDRESS: ${{ secrets.PAYTO_ADDRESS }}
        run: |
          # Push APIFY_TOKEN as Worker secret (idempotent — overwrites if exists)
          echo "$APIFY_TOKEN" | npx wrangler secret put APIFY_TOKEN
          # PAYTO_ADDRESS is set after we have a wallet; skip if absent.
          if [ -n "$PAYTO_ADDRESS" ]; then
            echo "$PAYTO_ADDRESS" | npx wrangler secret put PAYTO_ADDRESS
          else
            echo "PAYTO_ADDRESS not set yet — using placeholder. Add the secret once wallet is ready."
            echo "0x0000000000000000000000000000000000000000" | npx wrangler secret put PAYTO_ADDRESS
          fi

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
